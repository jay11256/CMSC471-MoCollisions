<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoCollisions Data Visualization</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container mt-5">
        <header class="text-center">
            <h1 class="title">MoCollisions Visualization</h1>
            <p class="subtitle">Exploring crash reporting data with interactive analytics</p>
        </header>

        <main>
            <div class="filter-container mb-4">
                <div class="row g-3">
                    <div class="col-md-4 col-sm-12">
                        <span class="form-label d-block">Time of day</span>
                        <div class="time-input-controls">
                            <div class="row g-2 align-items-center">
                                <div class="col-5">
                                    <input type="time" id="filter-time-start" class="form-control" value="00:00">
                                </div>
                                <div class="col-2 text-center text-muted">to</div>
                                <div class="col-5">
                                    <input type="time" id="filter-time-end" class="form-control" value="23:59">
                                </div>
                            </div>
                            <div class="time-range-axis small text-muted mt-1">
                                <span>(HH:MM)</span>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-6">
                        <label class="form-label">Day of Week</label>
                        <div id="filter-day-container" class="checkbox-group scrollable-group">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="1" id="day-1">
                                <label class="form-check-label" for="day-1">Mon</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="2" id="day-2">
                                <label class="form-check-label" for="day-2">Tue</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="3" id="day-3">
                                <label class="form-check-label" for="day-3">Wed</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="4" id="day-4">
                                <label class="form-check-label" for="day-4">Thu</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="5" id="day-5">
                                <label class="form-check-label" for="day-5">Fri</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="6" id="day-6">
                                <label class="form-check-label" for="day-6">Sat</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="0" id="day-0">
                                <label class="form-check-label" for="day-0">Sun</label>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-6">
                        <label class="form-label">Month</label>
                        <div id="filter-month-container" class="checkbox-group scrollable-group">
                            <!-- Months 0-11 -->
                            <div class="form-check"><input class="form-check-input" type="checkbox" value="0" id="m-0"><label class="form-check-label" for="m-0">Jan</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" value="1" id="m-1"><label class="form-check-label" for="m-1">Feb</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" value="2" id="m-2"><label class="form-check-label" for="m-2">Mar</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" value="3" id="m-3"><label class="form-check-label" for="m-3">Apr</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" value="4" id="m-4"><label class="form-check-label" for="m-4">May</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" value="5" id="m-5"><label class="form-check-label" for="m-5">Jun</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" value="6" id="m-6"><label class="form-check-label" for="m-6">Jul</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" value="7" id="m-7"><label class="form-check-label" for="m-7">Aug</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" value="8" id="m-8"><label class="form-check-label" for="m-8">Sep</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" value="9" id="m-9"><label class="form-check-label" for="m-9">Oct</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" value="10" id="m-10"><label class="form-check-label" for="m-10">Nov</label></div>
                            <div class="form-check"><input class="form-check-input" type="checkbox" value="11" id="m-11"><label class="form-check-label" for="m-11">Dec</label></div>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-6">
                        <label class="form-label">Weather</label>
                        <div id="filter-weather-container" class="checkbox-group scrollable-group">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-6">
                        <label class="form-label">Light Level</label>
                        <div id="filter-light-container" class="checkbox-group scrollable-group">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                </div>
            </div>

            <div id="loading" class="text-center my-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading data...</span>
                </div>
                <p class="mt-2 text-muted">Loading crash reporting data (87MB)...</p>
            </div>

            <div id="vis">
                <!-- D3 Visualization will be injected here -->
            </div>
            <div id="tooltip"></div>
        </main>

        <footer class="mt-5 text-center text-muted">
            <small>🤔🤔🤔</small>
        </footer>
    </div>

    <!-- D3.js v7 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Custom Script -->
    <script src="js/script.js"></script>
</body>

</html>
