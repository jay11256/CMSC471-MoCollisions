<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoCollisions Data Visualization</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container mt-5">
        <header class="text-center">
            <h1 class="title">MoCollisions Visualization</h1>
            <p class="subtitle">Exploring crash reporting data with interactive analytics</p>
        </header>

        <main>
            <div class="filter-container mb-4">
                <div class="row g-3">
                    <div class="col-md-2 col-sm-6">
                        <label for="filter-time" class="form-label">Time of Day</label>
                        <select id="filter-time" class="form-select custom-select">
                            <option value="all">All Times</option>
                            <option value="morning">Morning (6-12)</option>
                            <option value="afternoon">Afternoon (12-18)</option>
                            <option value="evening">Evening (18-24)</option>
                            <option value="night">Night (0-6)</option>
                        </select>
                    </div>
                    <div class="col-md-2 col-sm-6">
                        <label for="filter-day" class="form-label">Day of Week</label>
                        <select id="filter-day" class="form-select custom-select">
                            <option value="all">All Days</option>
                            <option value="weekday">Weekdays</option>
                            <option value="weekend">Weekends</option>
                        </select>
                    </div>
                    <div class="col-md-2 col-sm-6">
                        <label for="filter-month" class="form-label">Month</label>
                        <select id="filter-month" class="form-select custom-select">
                            <option value="all">All Months</option>
                            <!-- Will be populated dynamically or statically -->
                            <option value="0">January</option>
                            <option value="1">February</option>
                            <option value="2">March</option>
                            <option value="3">April</option>
                            <option value="4">May</option>
                            <option value="5">June</option>
                            <option value="6">July</option>
                            <option value="7">August</option>
                            <option value="8">September</option>
                            <option value="9">October</option>
                            <option value="10">November</option>
                            <option value="11">December</option>
                        </select>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <label for="filter-weather" class="form-label">Weather</label>
                        <select id="filter-weather" class="form-select custom-select">
                            <option value="all">All Weather</option>
                        </select>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <label for="filter-light" class="form-label">Light Level</label>
                        <select id="filter-light" class="form-select custom-select">
                            <option value="all">All Light Levels</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="loading" class="text-center my-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading data...</span>
                </div>
                <p class="mt-2 text-muted">Loading crash reporting data (87MB)...</p>
            </div>

            <div id="vis">
                <!-- D3 Visualization will be injected here -->
            </div>
            <div id="tooltip"></div>
        </main>

        <footer class="mt-5 text-center text-muted">
            <small>&copy; 2026 MoCollisions Analytics</small>
        </footer>
    </div>

    <!-- D3.js v7 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Custom Script -->
    <script src="js/script.js"></script>
</body>
</html>
